<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ceylon Chai - Authentic Tea & Food Experience</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Quicksand:wght@300;400;500;600;700&family=Great+Vibes&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --tea-brown: #4a2c1c;
            --tea-gold: #d4a574;
            --tea-cream: #f5e6d3;
            --tea-orange: #e88742;
            --dark-bg: #1a0f0a;
            --neon-orange: #ff6b35;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: var(--dark-bg);
            color: var(--tea-cream);
            overflow-x: hidden;
            cursor: default;
        }

        /* Custom Cursor */
        .custom-cursor {
            width: 20px;
            height: 20px;
            border: 2px solid var(--tea-gold);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: all 0.3s cubic-bezier(0.75, -0.5, 0.25, 1.5);
            mix-blend-mode: difference;
        }

        .cursor-follower {
            width: 40px;
            height: 40px;
            border: 1px solid var(--neon-orange);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9998;
            transition: all 0.6s ease-out;
            opacity: 0.5;
        }

        /* Animated Background */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: linear-gradient(135deg, #1a0f0a 0%, #2d1810 50%, #1a0f0a 100%);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .grain-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.03;
            z-index: 1;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='2.5' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            pointer-events: none;
        }

        /* Parallax Layers */
        .parallax-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0.1;
        }

        /* Container */
        .container {
            position: relative;
            z-index: 2;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            padding: 20px 0;
            background: rgba(26, 15, 10, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            transition: all 0.3s ease;
        }

        nav.scrolled {
            padding: 15px 0;
            background: rgba(26, 15, 10, 0.95);
        }

        .nav-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 40px;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-img {
            width: 60px;
            height: 60px;
            object-fit: contain;
            filter: drop-shadow(0 0 20px rgba(212, 165, 116, 0.5));
            transition: all 0.3s ease;
        }

        .logo-img:hover {
            transform: rotate(360deg) scale(1.1);
            filter: drop-shadow(0 0 30px rgba(212, 165, 116, 0.8));
        }

        .logo-text {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 700;
            color: var(--tea-gold);
            text-shadow: 0 0 20px rgba(212, 165, 116, 0.5);
        }

        .nav-links {
            display: flex;
            gap: 40px;
            list-style: none;
        }

        .nav-links a {
            color: var(--tea-cream);
            text-decoration: none;
            font-weight: 500;
            font-size: 16px;
            position: relative;
            transition: all 0.3s ease;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--tea-gold);
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-links a:hover {
            color: var(--tea-gold);
        }

        /* Hero Section */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            padding: 120px 20px 80px;
        }

        .steam-effect {
            position: absolute;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 300px;
            opacity: 0.3;
        }

        .steam {
            position: absolute;
            bottom: 0;
            width: 8px;
            height: 150px;
            background: linear-gradient(to top, rgba(255, 255, 255, 0.6), transparent);
            border-radius: 50%;
            animation: steam 4s ease-in-out infinite;
        }

        .steam:nth-child(1) { left: 30%; animation-delay: 0s; }
        .steam:nth-child(2) { left: 50%; animation-delay: 1s; }
        .steam:nth-child(3) { left: 70%; animation-delay: 2s; }

        @keyframes steam {
            0% {
                transform: translateY(0) scaleX(1);
                opacity: 0.6;
            }
            50% {
                transform: translateY(-100px) scaleX(1.5);
                opacity: 0.3;
            }
            100% {
                transform: translateY(-200px) scaleX(2);
                opacity: 0;
            }
        }

        .hero-content {
            text-align: center;
            max-width: 900px;
        }

        .hero-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(48px, 8vw, 96px);
            font-weight: 900;
            color: var(--tea-gold);
            margin-bottom: 20px;
            text-shadow: 0 0 40px rgba(212, 165, 116, 0.5);
            animation: fadeInUp 1s ease;
        }

        .hero-subtitle {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(24px, 4vw, 48px);
            color: var(--tea-orange);
            margin-bottom: 30px;
            animation: fadeInUp 1.2s ease;
        }

        .hero-description {
            font-size: clamp(16px, 2vw, 20px);
            line-height: 1.8;
            color: var(--tea-cream);
            margin-bottom: 40px;
            animation: fadeInUp 1.4s ease;
            opacity: 0.9;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .cta-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            animation: fadeInUp 1.6s ease;
        }

        .magnetic-btn {
            padding: 18px 45px;
            font-size: 18px;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            font-family: 'Quicksand', sans-serif;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--tea-orange), var(--neon-orange));
            color: white;
            box-shadow: 0 10px 30px rgba(255, 107, 53, 0.4);
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 15px 40px rgba(255, 107, 53, 0.6);
        }

        .btn-secondary {
            background: transparent;
            color: var(--tea-gold);
            border: 2px solid var(--tea-gold);
            box-shadow: 0 10px 30px rgba(212, 165, 116, 0.2);
        }

        .btn-secondary:hover {
            background: var(--tea-gold);
            color: var(--dark-bg);
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 15px 40px rgba(212, 165, 116, 0.4);
        }

        /* Info Bar */
        .info-bar {
            background: rgba(212, 165, 116, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            margin: 60px auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            animation: fadeInUp 1.8s ease;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 20px;
            background: var(--glass-bg);
            border-radius: 15px;
            transition: all 0.3s ease;
        }

        .info-item:hover {
            transform: translateY(-5px);
            background: rgba(212, 165, 116, 0.15);
            box-shadow: 0 10px 30px rgba(212, 165, 116, 0.2);
        }

        .info-icon {
            font-size: 32px;
            color: var(--tea-orange);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .info-text h3 {
            font-size: 16px;
            color: var(--tea-gold);
            margin-bottom: 5px;
        }

        .info-text p {
            font-size: 14px;
            color: var(--tea-cream);
            opacity: 0.8;
        }

        /* Menu Section */
        .menu-section {
            padding: 100px 20px;
            position: relative;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(36px, 6vw, 64px);
            font-weight: 900;
            text-align: center;
            color: var(--tea-gold);
            margin-bottom: 20px;
            text-shadow: 0 0 30px rgba(212, 165, 116, 0.5);
        }

        .section-subtitle {
            text-align: center;
            font-size: 18px;
            color: var(--tea-cream);
            opacity: 0.7;
            margin-bottom: 60px;
        }

        .category-filter {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 60px;
        }

        .filter-btn {
            padding: 12px 30px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            color: var(--tea-cream);
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Quicksand', sans-serif;
            font-weight: 600;
            backdrop-filter: blur(10px);
        }

        .filter-btn:hover, .filter-btn.active {
            background: var(--tea-gold);
            color: var(--dark-bg);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(212, 165, 116, 0.3);
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 40px;
            margin-top: 40px;
        }

        /* 3D Card with Glassmorphism */
        .menu-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 0;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        .menu-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(212, 165, 116, 0.1), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 0;
        }

        .menu-card:hover::before {
            opacity: 1;
        }

        .menu-card:hover {
            transform: translateY(-15px) rotateX(5deg);
            box-shadow: 0 30px 60px rgba(212, 165, 116, 0.3);
            border-color: var(--tea-gold);
        }

        .card-image-container {
            width: 100%;
            height: 250px;
            overflow: hidden;
            position: relative;
            background: rgba(0, 0, 0, 0.3);
        }

        .card-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .menu-card:hover .card-image {
            transform: scale(1.15) rotate(2deg);
        }

        .card-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--neon-orange);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(255, 107, 53, 0.5);
            animation: shake 2s ease-in-out infinite;
        }

        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-5deg); }
            75% { transform: rotate(5deg); }
        }

        .card-content {
            padding: 25px;
            position: relative;
            z-index: 1;
        }

        .card-title {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--tea-gold);
            margin-bottom: 10px;
        }

        .card-description {
            font-size: 14px;
            color: var(--tea-cream);
            opacity: 0.8;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-price {
            font-size: 28px;
            font-weight: 700;
            color: var(--neon-orange);
            text-shadow: 0 0 20px rgba(255, 107, 53, 0.5);
        }

        .add-to-cart-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, var(--tea-orange), var(--neon-orange));
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .add-to-cart-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 10px 25px rgba(255, 107, 53, 0.5);
        }

        /* Liquid Animation for Drinks */
        .liquid-effect {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 0;
            background: linear-gradient(180deg, transparent, rgba(232, 135, 66, 0.3));
            transition: height 0.5s ease;
            pointer-events: none;
        }

        .menu-card:hover .liquid-effect {
            height: 40%;
        }

        /* Reviews Section */
        .reviews-section {
            padding: 100px 20px;
            background: rgba(255, 255, 255, 0.02);
        }

        .reviews-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 60px;
        }

        .review-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .review-card::before {
            content: '"';
            position: absolute;
            top: -20px;
            left: 20px;
            font-size: 120px;
            color: var(--tea-gold);
            opacity: 0.1;
            font-family: 'Playfair Display', serif;
        }

        .review-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(212, 165, 116, 0.2);
            border-color: var(--tea-gold);
        }

        .review-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .reviewer-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--tea-orange), var(--neon-orange));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 700;
            color: white;
            box-shadow: 0 5px 15px rgba(255, 107, 53, 0.3);
        }

        .reviewer-info h4 {
            color: var(--tea-gold);
            font-size: 18px;
            margin-bottom: 5px;
        }

        .stars {
            color: var(--tea-orange);
            font-size: 14px;
        }

        .review-text {
            color: var(--tea-cream);
            line-height: 1.8;
            font-size: 15px;
            opacity: 0.9;
            position: relative;
            z-index: 1;
        }

        /* Gallery Section */
        .gallery-section {
            padding: 100px 20px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 60px;
        }

        .gallery-item {
            height: 350px;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.3);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
            filter: brightness(0.8);
        }

        .gallery-item:hover img {
            transform: scale(1.2) rotate(3deg);
            filter: brightness(1);
        }

        .gallery-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.8), transparent);
            padding: 30px;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }

        .gallery-item:hover .gallery-overlay {
            transform: translateY(0);
        }

        .gallery-title {
            color: var(--tea-gold);
            font-size: 20px;
            font-weight: 700;
            font-family: 'Playfair Display', serif;
        }

        /* Contact Section */
        .contact-section {
            padding: 100px 20px;
            background: rgba(255, 255, 255, 0.02);
        }

        .contact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            margin-top: 60px;
        }

        .contact-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .contact-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(212, 165, 116, 0.2);
            border-color: var(--tea-gold);
        }

        .contact-icon {
            font-size: 48px;
            color: var(--tea-orange);
            margin-bottom: 20px;
            animation: pulse 2s ease-in-out infinite;
        }

        .contact-card h3 {
            color: var(--tea-gold);
            font-size: 24px;
            margin-bottom: 15px;
            font-family: 'Playfair Display', serif;
        }

        .contact-card p, .contact-card a {
            color: var(--tea-cream);
            font-size: 16px;
            line-height: 1.8;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .contact-card a:hover {
            color: var(--tea-gold);
        }

        /* Footer */
        footer {
            background: rgba(0, 0, 0, 0.5);
            border-top: 1px solid var(--glass-border);
            padding: 60px 20px 30px;
            margin-top: 100px;
        }

        .footer-content {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 40px;
            margin-bottom: 40px;
        }

        .footer-section h3 {
            color: var(--tea-gold);
            font-size: 20px;
            margin-bottom: 20px;
            font-family: 'Playfair Display', serif;
        }

        .footer-section p, .footer-section a {
            color: var(--tea-cream);
            opacity: 0.8;
            line-height: 1.8;
            text-decoration: none;
            display: block;
            margin-bottom: 10px;
            transition: all 0.3s ease;
        }

        .footer-section a:hover {
            color: var(--tea-gold);
            opacity: 1;
            transform: translateX(5px);
        }

        .social-links {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .social-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--tea-gold);
            transition: all 0.3s ease;
        }

        .social-icon:hover {
            background: var(--tea-gold);
            color: var(--dark-bg);
            transform: translateY(-5px) rotate(360deg);
            box-shadow: 0 10px 20px rgba(212, 165, 116, 0.3);
        }

        .footer-bottom {
            text-align: center;
            padding-top: 30px;
            border-top: 1px solid var(--glass-border);
            color: var(--tea-cream);
            opacity: 0.6;
        }

        /* Cart Icon */
        .cart-icon-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 999;
        }

        .cart-icon {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--tea-orange), var(--neon-orange));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;

            height: 28px;

            font-weight: 700;

        }

        .scroll-top {
            position: fixed;
            bottom: 120px;
            right: 30px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--tea-gold);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--tea-gold);
            cursor: pointer;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 998;
        }

        .scroll-top.visible {
            opacity: 1;
        }

        .scroll-top:hover {
            background: var(--tea-gold);
            color: var(--dark-bg);
            transform: translateY(-5px);
        }

            display: none;
            flex-direction: column;

                display: flex;

            top: 0;
            left: 0;
            width: 100%;
            height: 100%;

            align-items: center;
            justify-content: center;

            opacity: 0;
            pointer-events: none;
        }

        .tea-cup-loader {
            width: 100px;
            height: 100px;
            position: relative;

        .cup {
            width: 80px;
            height: 60px;
            border: 4px solid var(--tea-gold);
            border-top: none;
            border-radius: 0 0 30px 30px;
            position: relative;
        }

        .cup::before {
            content: '';
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 10px;
            height: 20px;
            background: var(--tea-orange);
            border-radius: 50%;
            animation: pour 2s ease-in-out infinite;
        }

        @keyframes pour {
            0%, 100% { top: -20px; opacity: 0; }
            50% { top: 10px; opacity: 1; }
        }

        .cup::after {
            content: '';
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            height: 30px;
            background: linear-gradient(180deg, var(--tea-orange), var(--tea-brown));
            border-radius: 0 0 20px 20px;
            animation: fill 2s ease-in-out infinite;
        }

        @keyframes fill {
            0% { height: 0; }
            50%, 100% { height: 30px; }
        }
