name: Deploy To GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Pages Artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Production JS
        run: |
          set -e
          npx --yes --package @babel/core --package @babel/cli --package @babel/preset-react \
            babel app.js --out-file app.bundle.js --presets @babel/preset-react

      - name: Prepare Static Site
        run: |
          set -e
          mkdir -p site

          cp index.html site/
          cp styles.css site/
          cp app.js site/
          cp app.bundle.js site/
          cp supabase-config.js site/
          cp admin.html site/
          cp admin.css site/
          cp admin.js site/

          perl -0777 -i -pe "s#\n\s*<script src=\"https://unpkg.com/\@babel/standalone/babel\.min\.js\"></script>##s; s#<script type=\"text/babel\" src=\"app\.js\?v=[^\"]+\"></script>#<script defer src=\"app.bundle.js\"></script>#s" site/index.html

          if [ -d images ]; then
            cp -r images site/images
          fi

          touch site/.nojekyll

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy To Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
