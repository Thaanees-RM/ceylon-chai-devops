# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build production app bundle
        run: |
          set -e
          npx --yes --package @babel/core --package @babel/cli --package @babel/preset-react \
            babel app.js --out-file app.bundle.js --presets @babel/preset-react

      - name: Prepare static artifact
        run: |
          set -e
          rm -rf site
          mkdir -p site

          cp index.html site/
          cp styles.css site/
          cp app.js site/
          cp app.bundle.js site/
          cp supabase-config.js site/
          cp admin.html site/
          cp admin.css site/
          cp admin.js site/

          if [ -d images ]; then
            cp -r images site/images
          fi

          # Production page should load precompiled JS, not runtime Babel transform.
          perl -0777 -i -pe "s#\n\s*<script src=\"https://unpkg.com/\@babel/standalone/babel\.min\.js\"></script>##s; s#<script type=\"text/babel\" src=\"app\.js\?v=[^\"]+\"></script>#<script defer src=\"app.bundle.js\"></script>#s" site/index.html

          touch site/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'site'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
